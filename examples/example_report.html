  th{color:var(--muted);font-weight:600;width:30%}

  .pe{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin:12px 0}
  .pe .top{display:flex;gap:10px;align-items:center}
  .pri-high{color:var(--path);font-weight:700}.pri-medium{color:var(--lp)}.pri-low{color:var(--muted)}
  details{margin:8px 0} summary{cursor:pointer;color:var(--accent)}
  .ref{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted)}
  .muted{color:var(--muted)} .narr{line-height:1.6}
  ul{margin:6px 0 6px 18px;padding:0} li{margin:3px 0}
  a{color:var(--accent)}
  .pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
</style>

voltage step protocol -80 to +40 mV.", "Measure current density (pA/pF), V50 of activation, and activation/deactivation kinetics; n>=10 cells/condition across >=3 transfections.", "Analyse blinded to genotype."], "sample_requirements": "No patient sample required (heterologous system); requires validated KCNQ2/KCNQ3 constructs.", "controls": ["WT KCNQ2+KCNQ3 (positive/normal current)", "untransfected / GFP-only (negative)", "a known pathogenic dominant-negative KCNQ2 variant (assay sensitivity control)", "a known benign KCNQ2 variant (specificity control)"], "readout": "M-current density (pA/pF) and biophysical parameters per condition.", "interpretation_framework": "PS3 supported if mutant-alone current is <50% of WT AND the WT+mutant condition is significantly below WT (p<0.05) with effect size comparable to the positive dominant-negative control. A current indistinguishable from WT would be evidence AGAINST pathogenicity (potential BS3).", "limitations": ["Heterologous system may not capture neuronal context or auxiliary subunits.", "Does not establish in vivo causation, only molecular effect.", "Construct/expression artefacts can confound \u2014 mitigated by parallel benign/pathogenic controls."], "estimated_turnaround": "6-10 weeks"}, "plan_review": {"critiques": [{"issue": "Without a known dominant-negative positive control, a 'reduced current' result is hard to calibrate against the assay's dynamic range.", "severity": "major", "resolution": "Positive dominant-negative control already specified in controls; require it to pass before interpreting the test variant."}, {"issue": "M-current is KCNQ2/KCNQ3 heteromeric; testing KCNQ2 alone would under-represent physiology.", "severity": "minor", "resolution": "Protocol co-expresses KCNQ3 in all conditions."}, {"issue": "Result is supportive (PS3) but not decisive given C001 is already Pathogenic on existing evidence \u2014 weigh cost/turnaround against clinical value.", "severity": "minor", "resolution": "Down-prioritised to medium; PE001 (segregation) is the higher-value action."}], "feasibility": "high", "verdict": "recommended_with_changes"}}, {"id": "PE003", "related_candidates": ["C001"], "category": "reanalysis", "question": "Why did the v3 epilepsy panel not report KCNQ2 c.821C>T despite covering the gene?", "rationale": "Clarifying whether this was a coverage gap, a filtering threshold, or a classification difference informs lab QA and confirms the WGS finding is not a false positive unique to this pipeline.", "priority": "medium", "expected_impact": {"acmg_criteria_affected": [], "could_change_classification_from": "Pathogenic", "to": "Pathogenic (orthogonally confirmed)", "decisiveness": "supportive"}}], "excluded_variants_summary": [{"locus": "chr1:11796321 C>T", "gene": "MTHFR", "stage_excluded": "frequency", "reason": "gnomAD AF 0.31 (BA1) \u2014 common polymorphism, not disease-causing.", "evidence_ref": "api_gnomad rs1801133"}, {"locus": "chr7:117559593 G>A", "gene": "CFTR", "stage_excluded": "phenotype_mismatch", "reason": "Pathogenic for cystic fibrosis but no phenotypic overlap with neonatal epileptic encephalopathy; incidental carrier finding.", "evidence_ref": "gene_disease phenotype score 0.02"}, {"locus": "chr15:42680000-42690000 DEL", "gene": "(intergenic)", "stage_excluded": "adversarial_review", "reason": "10 kb deletion call failed IGV review: both breakpoints in segmental duplication, supported by soft-clipped reads only, no discordant pairs \u2014 technical artifact (unrefuted fatal challenge).", "evidence_ref": "igv C_SV breakpoint in segdup"}], "run_summary": {"headline": "A Pathogenic de novo (presumed) KCNQ2 pore-domain variant explains this neonatal epileptic encephalopathy and was missed by the prior gene panel. One secondary VUS (SCN2A) is retained with a mechanism caveat.", "n_variants_in": 4812334, "n_after_qc": 4120556, "n_after_frequency": 1184, "n_candidates_reported": 2, "top_candidate_id": "C001", "diagnostic_conclusion": "likely_solved"}};

const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const cls = s => esc(s).replace(/\s+/g,"-");
const el = (h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};

function refLink(r){
  if(!r) return "";
  const v = esc(r.value||r);
  const kind = r.kind||"";
  let href = null;
  if(kind==="api_pubmed"||/^PMID:/.test(v)) href="https://pubmed.ncbi.nlm.nih.gov/"+v.replace("PMID:","");
  else if(kind==="api_clinvar") href="https://www.ncbi.nlm.nih.gov/clinvar/variation/"+v.replace(/^VCV/,"");
  return `<span class="ref">${href?`[<a href="${href}" target="_blank">${v}</a>]`:`[${v}]`}</span>`;
}
function refs(arr){ return (arr||[]).map(refLink).join(" "); }

function kv(obj, keys){
  const rows = keys.filter(([k])=>obj && obj[k]!=null && obj[k]!=="").map(([k,label])=>
    `<div><span class="k">${esc(label)}</span><span class="v">${esc(obj[k])}</span></div>`);
  return rows.length? `<div class="kv">${rows.join("")}</div>` : `<div class="muted">No data.</div>`;
}

function header(){
  const r=REPORT, rs=r.run_summary||{};
  document.getElementById("subtitle").textContent =
    `Case ${r.case_id} · ${r.assembly||""} · generated ${r.generated_at||""} · ${(r.pipeline&&r.pipeline.version)||""}`;
  const stats=[
    ["Candidates reported",(r.candidate_variants||[]).length],
    ["Diagnostic conclusion",(rs.diagnostic_conclusion||"-").replace(/_/g," ")],
    ["Variants screened",rs.n_variants_in??"-"],
    ["After QC",rs.n_after_qc??"-"],
    ["Pending evidence",(r.pending_evidence||[]).length],
    ["Excluded (audited)",(r.excluded_variants_summary||[]).length],
  ];
  const app=document.getElementById("app");
  if(rs.headline) app.appendChild(el(`<div class="card"><div style="padding:14px 18px" class="narr">${esc(rs.headline)}</div></div>`));
  app.appendChild(el(`<div class="grid">${stats.map(([l,n])=>
    `<div class="stat"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`).join("")}</div>`));
}

function patientPanel(){
  const p=REPORT.patient||{};
  const hpo=(p.hpo_terms||[]).map(t=>`<span class="tag">${esc(t.id)}${t.label?" "+esc(t.label):""}</span>`).join(" ");
  const prior=(p.prior_testing||[]).map(t=>`<li><b>${esc(t.test)}</b>: ${esc(t.result)} <span class="muted">${esc(t.implication||"")}</span></li>`).join("");
  const c=el(`<div class="card"><div class="chead" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="gene">Patient & phenotype</span><span class="spacer"></span>
      <span class="muted">${(p.hpo_terms||[]).length} HPO terms</span></div>
    <div class="cbody open">
      <div class="sec"><h3>Summary</h3><div class="narr">${esc(p.phenotype_summary||"")}</div></div>
      <div class="sec"><h3>HPO terms</h3><div class="pill-row">${hpo}</div></div>
      <div class="sec"><h3>Clinical context</h3>${kv(p,[["age_of_onset","Age of onset"],["consanguinity","Consanguinity"],["ethnicity","Ancestry"],["family_history","Family history"]])}
        <div style="margin-top:8px"><span class="k muted">Inheritance hypotheses: </span>${(p.inheritance_hypotheses||[]).map(esc).join(", ")}</div></div>
      ${prior?`<div class="sec"><h3>Prior testing</h3><ul>${prior}</ul></div>`:""}
    </div></div>`);
  document.getElementById("app").appendChild(c);
}

function acmgSection(a){
  if(!a) return "";
  const crit=(a.applied_criteria||[]).filter(c=>c.applied!==false).map(c=>
    `<div class="crit ${c.direction==="benign"?"benign":"path"}">
       <span class="code">${esc(c.code)}</span>
       <div><b>${esc(c.strength)}</b> · ${esc(c.direction)}<br>
       <span class="narr">${esc(c.rationale)}</span> ${refs(c.evidence_refs)}</div></div>`).join("");
  const non=(a.non_acmg_evidence||[]).map(e=>`<li>${esc(e)}</li>`).join("");
  return `<div class="sec"><h3>ACMG-aligned classification —
      <span class="badge b-${cls(a.classification)}">${esc(a.classification)}</span>
      <span class="muted">(${a.point_score} pts · ${esc(a.classification_method||"")})</span></h3>
    ${crit||'<div class="muted">No criteria applied.</div>'}
    ${non?`<details><summary>Supporting evidence beyond formal ACMG codes</summary><ul>${non}</ul></details>`:""}</div>`;
}

function advSection(ar){
  if(!ar) return "";
  const chals=(ar.challenges||[]).map(c=>
    `<div class="chal ${esc(c.severity)}">
       <div class="top"><span class="tag">${esc((c.attack_surface||"").replace(/_/g," "))}</span>
         <span class="tag">${esc(c.severity)}</span>
         <span class="status-${esc(c.status)}">${esc(c.status)}</span></div>
       <div class="narr">${esc(c.challenge)}</div>
       ${c.rebuttal?`<div class="narr"><b>Rebuttal:</b> ${esc(c.rebuttal)} ${refs(c.evidence_refs)}</div>`:""}
       ${c.residual_risk?`<div class="muted">Residual risk: ${esc(c.residual_risk)}</div>`:""}
     </div>`).join("");
  return `<div class="sec"><h3>Adversarial review —
      <span class="badge ${ar.survives_review?"b-survive":"b-fail-gate"}">${ar.survives_review?"SURVIVES":"FAILS GATE"}</span>
      <span class="muted">confidence: ${esc(ar.confidence)}</span></h3>
    <div class="narr" style="margin-bottom:8px">${esc(ar.reviewer_verdict||"")}</div>${chals}</div>`;
}

function igvSection(q){
  const ig=q&&q.igv_assessment; if(!ig||!ig.image) return "";
  const extra=(ig.extra_images||[]).map(i=>`<img src="${esc(i)}" alt="igv">`).join("");
  return `<div class="sec igv"><h3>IGV visual review —
      <span class="badge b-${cls(ig.verdict==="clean"?"pass":ig.verdict==="artifact_suspected"?"fail":"caution")}">${esc(ig.verdict||"")}</span></h3>
    <div class="narr">${esc(ig.observations||"")}</div>
    <img src="${esc(ig.image)}" alt="igv">${extra}</div>`;
}

function candidateCard(c,i,excluded){
  const g=c.genomic||{}, gene=c.gene||{}, a=c.acmg||{}, ar=c.adversarial_review||{};
  const loc = g.pos!=null ? `${esc(g.chrom)}:${esc(g.pos)} ${esc(g.ref)}>${esc(g.alt)}`
                          : `${esc(g.chrom)}:${esc(g.start)}-${esc(g.end)} ${esc(g.sv_type||"")}`;
  const oa=c.overall_assessment||{};
  const lit=(c.literature||[]).map(l=>`<li>${refLink({kind:"api_pubmed",value:"PMID:"+l.pmid})}
     <b>${esc(l.title)}</b> <span class="muted">(${esc(l.relevance)})</span> — ${esc(l.finding)}</li>`).join("");
  const gd=(c.gene_disease&&c.gene_disease.associated_conditions||[]).map(x=>
     `<li>${esc(x.name)} <span class="muted">${esc(x.omim||"")} · ${esc(x.inheritance||"")} · validity: ${esc(x.clingen_validity||"")}</span></li>`).join("");
  const pm=c.gene_disease&&c.gene_disease.phenotype_match;
  const card=el(`<div class="card ${excluded?"excluded":""}">
    <div class="chead" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="rank">${excluded?"✕":(c.rank||i+1)}</span>
      <div><div class="gene">${esc(gene.symbol||"?")} <span class="muted" style="font-weight:400">${esc(c.variant_type||"")}</span></div>
        <div class="loc">${loc} ${esc(g.hgvs_c||"")} ${esc(g.hgvs_p||"")}</div></div>
      <span class="spacer"></span>
      ${oa.candidacy?`<span class="badge b-${esc(oa.candidacy)}">${esc(oa.candidacy)}</span>`:""}
      <span class="badge ${ar.survives_review===false?"b-fail-gate":"b-survive"}">${ar.survives_review===false?"excluded":"reviewed"}</span>
      <span class="badge b-${cls(a.classification||"Uncertain significance")}">${esc(a.classification||"VUS")}</span>
    </div>
    <div class="cbody">
      ${oa.summary?`<div class="sec"><h3>Assessment</h3><div class="narr">${esc(oa.summary)}</div></div>`:""}
      <div class="sec"><h3>Variant</h3>
        ${kv({...g,...gene,zyg:c.zygosity,cons:(c.consequence||{}).vep_consequence,impact:(c.consequence||{}).impact},
          [["transcript","Transcript"],["mane_select","MANE"],["cons","Consequence"],["impact","Impact"],
           ["zyg","Zygosity"],["hgvs_c","HGVS c."],["hgvs_p","HGVS p."],["rsid","dbSNP"]])}</div>
      <div class="sec"><h3>Quality</h3>${qcKV(c.quality)}</div>
      <div class="sec"><h3>Population & predictors</h3>${freqKV(c)}</div>
      ${c.clinvar?`<div class="sec"><h3>ClinVar</h3>${kv(c.clinvar,[["variation_id","Accession"],["clinical_significance","Significance"],["review_status","Review"],["star_rating","Stars"],["last_evaluated","Last evaluated"]])}</div>`:""}
      ${gd?`<div class="sec"><h3>Gene–disease</h3><ul>${gd}</ul>${pm?`<div class="muted">Phenotype match: ${pm.score??"-"} · matched ${(pm.matched_hpo||[]).length} HPO · missing cardinal: ${(pm.missing_cardinal_features||[]).join(", ")||"none"}</div>`:""}</div>`:""}
      ${acmgSection(a)}
      ${igvSection(c.quality)}
      ${lit?`<div class="sec"><h3>Literature</h3><ul>${lit}</ul></div>`:""}
      ${advSection(ar)}
    </div></div>`);
  return card;
}

function qcKV(q){
  if(!q) return '<div class="muted">No QC.</div>';
  const ig=q.igv_assessment||{};
  const v=`<span class="badge b-${esc(q.qc_verdict||"caution")}">${esc(q.qc_verdict||"?")}</span>`;
  return `<div style="margin-bottom:6px">QC verdict: ${v} ${q.qc_notes?'<span class="muted">'+esc(q.qc_notes)+'</span>':''}</div>`+
    kv(q,[["filter","FILTER"],["depth","Depth"],["genotype_quality","GQ"],["allele_balance","Allele balance"],
      ["alt_read_count","Alt reads"],["mapping_quality","MAPQ"],["strand_bias_phred","Strand bias"],
      ["in_segmental_duplication","In segdup"],["in_low_complexity_or_repeat","Repeat/LCR"],["sv_caller_support","SV support"]]);
}
function freqKV(c){
  const f=c.population_frequency||{}, p=c.predictions||{}, gc=c.gene_constraint||{};
  return kv({...f,...p,...gc},[["gnomad_af_global","gnomAD AF"],["gnomad_af_popmax","gnomAD popmax"],
    ["gnomad_popmax_population","popmax pop"],["gnomad_hom_count","Homozygotes"],["gnomad_hemi_count","Hemizygotes"],
    ["consistent_with_disease","AF consistent w/ disease"],
    ["revel","REVEL"],["cadd_phred","CADD"],["alphamissense","AlphaMissense"],["spliceai_max_ds","SpliceAI"],
    ["phylop","phyloP"],["pli","pLI"],["loeuf","LOEUF"]]);
}

function pendingPanel(){
  const list=REPORT.pending_evidence||[]; if(!list.length) return;
  const app=document.getElementById("app");
  app.appendChild(el(`<h2 style="margin:28px 0 4px">Pending evidence (${list.length})</h2>
    <div class="sub">Specific questions / experiments that could materially change a classification.</div>`));
  list.forEach(pe=>{
    const ei=pe.expected_impact||{};
    const plan=pe.experimental_plan, pr=pe.plan_review;
    const planHtml = plan? `<details open><summary>Experimental plan — ${esc(plan.method)}</summary>
        ${kv(plan,[["objective","Objective"],["hypothesis","Hypothesis"],["sample_requirements","Samples"],["readout","Readout"],["estimated_turnaround","Turnaround"]])}
        ${plan.protocol_outline?`<div class="muted" style="margin-top:6px">Protocol:</div><ol>${plan.protocol_outline.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`:""}
        ${plan.controls?`<div class="muted">Controls: ${plan.controls.map(esc).join(", ")}</div>`:""}
        ${plan.interpretation_framework?`<div class="narr"><b>Interpretation:</b> ${esc(plan.interpretation_framework)}</div>`:""}
        ${plan.limitations?`<div class="muted">Limitations: ${plan.limitations.map(esc).join("; ")}</div>`:""}
      </details>`:"";
    const prHtml = pr? `<details><summary>Critical review of the plan — verdict: <b>${esc(pr.verdict)}</b> (feasibility ${esc(pr.feasibility)})</summary>
        ${(pr.critiques||[]).map(c=>`<div class="chal ${esc(c.severity)}"><b>${esc(c.severity)}:</b> ${esc(c.issue)}<br><span class="muted">→ ${esc(c.resolution)}</span></div>`).join("")}
      </details>`:"";
    app.appendChild(el(`<div class="pe">
      <div class="top"><span class="pri-${esc(pe.priority||"low")}">${esc((pe.priority||"").toUpperCase())}</span>
        <span class="tag">${esc((pe.category||"").replace(/_/g," "))}</span>
        <b>${esc(pe.id)}</b> <span class="muted">→ ${(pe.related_candidates||[]).map(esc).join(", ")}</span></div>
      <div class="narr" style="margin:8px 0"><b>${esc(pe.question)}</b></div>
      <div class="narr">${esc(pe.rationale)}</div>
      <div class="muted" style="margin-top:6px">Could change ${esc(ei.could_change_classification_from||"-")} → ${esc(ei.to||"-")}
        · affects ${(ei.acmg_criteria_affected||[]).map(esc).join(", ")||"-"} · ${esc(ei.decisiveness||"")}</div>
      ${planHtml}${prHtml}</div>`));
  });
}

function excludedPanel(){
  const ex=REPORT.excluded_variants_summary||[]; if(!ex.length) return;
  const app=document.getElementById("app");
  const rows=ex.map(e=>`<tr><td>${esc(e.gene||"")}</td><td class="loc">${esc(e.locus||"")}</td><td>${esc(e.stage_excluded||"")}</td><td>${esc(e.reason||"")}</td></tr>`).join("");
  app.appendChild(el(`<details style="margin-top:24px"><summary><b>Excluded variants (${ex.length}) — audit trail</b></summary>
    <div class="card"><table><tr><th>Gene</th><th>Locus</th><th>Stage</th><th>Reason</th></tr>${rows}</table></div></details>`));
}

function main(){
  if(!REPORT){document.getElementById("app").innerHTML="<p class='muted'>No report data embedded.</p>";return;}
  header(); patientPanel();
  document.getElementById("app").appendChild(el(`<h2 style="margin:24px 0 4px">Candidate variants (${(REPORT.candidate_variants||[]).length})</h2>`));
  (REPORT.candidate_variants||[]).forEach((c,i)=>document.getElementById("app").appendChild(candidateCard(c,i,false)));
  pendingPanel(); excludedPanel();
}
main();
</script>
